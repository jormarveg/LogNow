services:
  web:
    container_name: lognow-web
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html:z
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:z
    depends_on:
      - php

  php:
    container_name: lognow-php
    build: .
    environment:
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - ./:/var/www/html:z
    depends_on:
      - db
    command: sh -c "mkdir -p /var/www/html/uploads/avatars /var/www/html/uploads/covers && chown -R www-data:www-data /var/www/html/uploads && chmod -R 775 /var/www/html/uploads && php-fpm"

  db:
    container_name: lognow-db
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: lognow
    ports:
      - "3306:3306"
    volumes:
      - db_datos:/var/lib/mysql

  phpmyadmin:
    container_name: lognow-pma
    image: phpmyadmin:latest
    ports:
      - "8000:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    depends_on:
      - db

volumes:
  db_datos:
